name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: linux-x86_64
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            name: macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            name: macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            name: windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: strip target/${{ matrix.target }}/release/tsn

      - name: Strip binary (macOS)
        if: startsWith(matrix.os, 'macos')
        run: strip target/${{ matrix.target }}/release/tsn

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          DIR=tsn-${VERSION}-${{ matrix.name }}
          mkdir -p ${DIR}/circuits/keys
          cp target/${{ matrix.target }}/release/tsn ${DIR}/
          cp circuits/keys/*.json ${DIR}/circuits/keys/ 2>/dev/null || true
          cp circuits/keys/checksums.sha256 ${DIR}/circuits/keys/ 2>/dev/null || true
          cp README.md ${DIR}/
          tar czf tsn-${VERSION}-${{ matrix.name }}.tar.gz ${DIR}
          sha256sum tsn-${VERSION}-${{ matrix.name }}.tar.gz > tsn-${VERSION}-${{ matrix.name }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          $DIR = "tsn-${VERSION}-${{ matrix.name }}"
          New-Item -ItemType Directory -Path "${DIR}/circuits/keys" -Force
          Copy-Item "target/${{ matrix.target }}/release/tsn.exe" "${DIR}/"
          Copy-Item "circuits/keys/*.json" "${DIR}/circuits/keys/" -ErrorAction SilentlyContinue
          Copy-Item "README.md" "${DIR}/"
          Compress-Archive -Path "${DIR}" -DestinationPath "tsn-${VERSION}-${{ matrix.name }}.zip"
          (Get-FileHash "tsn-${VERSION}-${{ matrix.name }}.zip" -Algorithm SHA256).Hash.ToLower() + "  tsn-${VERSION}-${{ matrix.name }}.zip" | Out-File "tsn-${VERSION}-${{ matrix.name }}.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tsn-${{ matrix.name }}
          path: |
            tsn-*.${{ matrix.ext }}
            tsn-*.${{ matrix.ext }}.sha256

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tsn-*.tar.gz
            tsn-*.zip
            tsn-*.sha256
